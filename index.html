<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gallery</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#f5f5f5;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body.in-iframe{background:transparent}

    #gallery-root {
      --gap: 14px; --border-size: 2px; --border-color: #ffffff; --radius: 14px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --hover-shadow: 0 16px 32px rgba(0,0,0,0.22);
      max-width: 100%; margin: 0 auto; padding: 24px 18px;
    }

    .gallery-masonry { column-count: 3; column-gap: var(--gap); }

    .card {
      break-inside: avoid; margin-bottom: var(--gap);
      border-radius: var(--radius); border: var(--border-size) solid var(--border-color);
      background: #eaeaea; box-shadow: var(--shadow);
      transition: transform 0.3s cubic-bezier(.25,.46,.45,.94), box-shadow 0.3s ease;
      cursor: pointer; overflow: hidden; line-height: 0; position: relative;
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--hover-shadow); border-color:#eee; }
    .card-img-wrap { position: relative; display: block; border-radius: calc(var(--radius) - 2px); overflow: hidden; }
    .card-img-wrap img { width:100%; height:auto; display:block; background:#eaeaea; transition: transform 0.4s cubic-bezier(.25,.46,.45,.94); }
    .card:hover .card-img-wrap img { transform: scale(1.03); }

    /* ========== LIGHTBOX - ANTI BOCOR / SCROLL LOCK ========== */
    .lightbox {
      position: fixed !important; 
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 999999 !important;
      background: rgba(246,246,246,0.98);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      display: flex; flex-direction: column;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      overflow: hidden !important; /* HARGA MATI: Tidak boleh ada scroll */
    }
    .lightbox.active { opacity: 1; visibility: visible; }

    .lightbox-content {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      position: relative;
    }

    /* --- HEADER (Download & Close) --- */
    .lightbox-header {
      flex: 0 0 auto; /* Ukuran kaku, tidak akan membesar/mengecil */
      height: 70px;
      display: flex; justify-content: flex-end; align-items: center;
      padding: 0 24px; gap: 12px;
      position: relative; z-index: 20;
    }
    .header-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.06); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .header-btn:hover { background: rgba(0,0,0,0.15); transform: scale(1.05); }
    .header-btn svg { width: 20px; height: 20px; stroke: #333; }

    /* --- BODY (Area Gambar & Panah) --- */
    .lightbox-body {
      flex: 1 1 auto; /* Mengambil sisa ruang layar */
      position: relative; /* KUNCI: Menjadi batas absolute untuk gambar */
      width: 100%;
    }
    
    /* WADAH ABSOLUT (Menghentikan gambar merusak layout) */
    .image-absolute-container {
      position: absolute; /* Gambar tidak bisa lagi mendorong tinggi layar */
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0 80px; /* Jarak kiri-kanan agar tidak nabrak panah */
    }

    .image-absolute-container img {
      max-width: 100%; 
      max-height: 100%; 
      object-fit: contain; /* Dijamin utuh, tidak terpotong (clip) */
      display: block;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      opacity: 0; transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .image-absolute-container img.loaded { opacity: 1; transform: scale(1); }

    /* PANAH NAVIGASI */
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(0,0,0,0.06); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .nav-arrow:hover { background: rgba(0,0,0,0.15); }
    .nav-arrow svg { width: 24px; height: 24px; stroke: #333; }
    .nav-arrow.prev { left: 16px; }
    .nav-arrow.next { right: 16px; }

    /* LOADER & ERROR */
    .loading-spinner {
      position: absolute; width: 40px; height: 40px;
      border: 4px solid rgba(0,0,0,0.1); border-top-color: #333;
      border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .loading-spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-text {
      position: absolute; color: #d32f2f; font-size: 14px;
      background: #ffebee; padding: 8px 16px; border-radius: 8px; display: none;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .error-text.active { display: block; }

    /* --- FOOTER (Caption & Thumbnails) --- */
    .lightbox-footer {
      flex: 0 0 auto; /* Ukuran kaku */
      display: flex; flex-direction: column; align-items: center;
      width: 100%; 
      padding: 16px 24px 32px 24px; /* Jarak bawah lega */
      gap: 16px; /* Jarak lapang antara teks dan thumbnail */
      position: relative; z-index: 20;
    }
    
    .lightbox-caption {
      text-align: center; color: #333; font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;
    }
    .lightbox-caption:empty { display: none; }

    .thumbnails-wrap {
      width: 100%; max-width: 100%;
      display: flex; gap: 12px; overflow-x: auto; scroll-behavior: smooth;
      padding: 12px 16px; background: rgba(0,0,0,0.05); border-radius: 12px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .thumbnails-wrap::-webkit-scrollbar { display: none; }
    
    .thumb-item {
      flex: 0 0 auto; width: 64px; height: 64px;
      border-radius: 8px; overflow: hidden;
      cursor: pointer; opacity: 0.5; border: 2px solid transparent;
      transition: 0.2s ease; background: #ddd;
    }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-item.active { opacity: 1; border-color: #333; transform: scale(1.05); }
    .thumb-item:hover { opacity: 0.9; }

    /* ===== RESPONSIVE UNTUK HP ===== */
    @media (max-width: 1024px) { .gallery-masonry { column-count: 2; } }
    @media (max-width: 640px) {
      .gallery-masonry { column-count: 1; }
      .lightbox-header { height: 60px; padding: 0 16px; }
      .image-absolute-container { padding: 0 10px; } /* Lebarkan gambar di HP */
      .nav-arrow { width: 40px; height: 40px; }
      .nav-arrow.prev { left: 4px; }
      .nav-arrow.next { right: 4px; }
      .lightbox-footer { padding: 12px 16px 24px 16px; }
      .thumb-item { width: 56px; height: 56px; }
      .lightbox-caption { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="gallery-root">
    <div class="gallery-status" id="galleryStatus">Loading gallery...</div>
    <div class="gallery-masonry" id="masonryGrid"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      
      <!-- HEADER -->
      <div class="lightbox-header">
        <button class="header-btn" id="downloadBtn" aria-label="Download">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="header-btn" id="lightboxClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- BODY -->
      <div class="lightbox-body">
        <button class="nav-arrow prev" id="prevBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 4 7 12 15 20"/></svg>
        </button>
        
        <div class="image-absolute-container" id="imageWrapper">
          <div class="loading-spinner" id="loadingSpinner"></div>
          <div class="error-text" id="errorText">Gagal memuat gambar.</div>
          <img id="mainImage" src="" alt="" />
        </div>

        <button class="nav-arrow next" id="nextBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 4 17 12 9 20"/></svg>
        </button>
      </div>

      <!-- FOOTER -->
      <div class="lightbox-footer">
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <div class="thumbnails-wrap" id="thumbnailsStrip"></div>
      </div>

    </div>
  </div>

  <script>
  (function() {
    const DATA_URL = './gallery-data.json';

    const masonryGrid   = document.getElementById('masonryGrid');
    const statusEl      = document.getElementById('galleryStatus');
    const lightbox      = document.getElementById('lightbox');
    const mainImage     = document.getElementById('mainImage');
    const captionEl     = document.getElementById('lightboxCaption');
    const thumbStrip    = document.getElementById('thumbnailsStrip');
    const spinner       = document.getElementById('loadingSpinner');
    const errorTxt      = document.getElementById('errorText');
    const dlBtn         = document.getElementById('downloadBtn');

    // Menghindari konflik parent CSS dengan memindahkan lightbox ke root body
    document.body.appendChild(lightbox);

    let items = [];
    let currentIndex = 0;

    function sendHeight() {
      if (window.parent && window.parent !== window) {
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'galleryResize', height: h }, '*');
      }
    }
    if (window.parent && window.parent !== window) document.body.classList.add('in-iframe');

    function buildMasonry() {
      masonryGrid.innerHTML = '';
      items.forEach((item, i) => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${item.url}" loading="lazy" alt="Gallery image">
          </div>
          ${item.caption ? `<div class="card-caption">${item.caption}</div>` : ''}
        `;
        card.addEventListener('click', () => openLightbox(i));
        masonryGrid.appendChild(card);
      });
      setTimeout(sendHeight, 500);
    }

    function buildThumbnails() {
      thumbStrip.innerHTML = '';
      items.forEach((item, i) => {
        const t = document.createElement('div'); t.className = 'thumb-item'; t.dataset.index = i;
        t.innerHTML = `<img src="${item.url}" loading="lazy" alt="thumb">`;
        t.addEventListener('click', () => loadLightboxImage(i));
        thumbStrip.appendChild(t);
      });
    }

    function loadLightboxImage(index) {
      currentIndex = index;
      const data = items[currentIndex];
      
      mainImage.classList.remove('loaded');
      mainImage.src = ''; 
      spinner.classList.add('active');
      errorTxt.classList.remove('active');
      captionEl.textContent = data.caption || '';
      
      Array.from(thumbStrip.children).forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
        if(i === currentIndex) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });

      const newImg = new Image();
      newImg.onload = () => {
        spinner.classList.remove('active');
        mainImage.src = newImg.src;
        requestAnimationFrame(() => mainImage.classList.add('loaded'));
      };
      newImg.onerror = () => {
        spinner.classList.remove('active');
        errorTxt.classList.add('active');
      };
      newImg.src = data.url;
    }

    function openLightbox(index) {
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; // Mengunci scroll body belakang
      loadLightboxImage(index);
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      mainImage.src = '';
    }

    // Navigasi
    document.getElementById('prevBtn').addEventListener('click', () => {
      if(!items.length) return;
      loadLightboxImage((currentIndex - 1 + items.length) % items.length);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if(!items.length) return;
      loadLightboxImage((currentIndex + 1) % items.length);
    });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    
    // Klik area kosong untuk menutup
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if(e.target === lightbox || e.target.classList.contains('lightbox-body') || e.target.classList.contains('image-absolute-container')) {
        closeLightbox();
      }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
    });

    // Download Button Action
    dlBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const url = items[currentIndex].url;
      const a = document.createElement('a'); 
      a.href = url; a.download = url.split('/').pop().split('?')[0] || 'image.jpg';
      a.target = '_blank';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    // Fetch JSON Data
    fetch(DATA_URL)
      .then(res => {
        if (!res.ok) throw new Error('Data not found');
        return res.json();
      })
      .then(data => {
        if (!data || !data.length) throw new Error('Empty');
        items = data.map(item => typeof item === 'string' ? {url: item, caption: ''} : item);
        statusEl.style.display = 'none';
        buildMasonry();
        buildThumbnails();
      })
      .catch(err => {
        statusEl.textContent = 'Gagal memuat gallery-data.json.';
        statusEl.classList.add('error');
      });
  })();
  </script>
</body>
</html>
