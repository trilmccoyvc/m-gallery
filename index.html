<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gallery</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#f5f5f5;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body.in-iframe{background:transparent}

    #gallery-root {
      --gap: 14px; --border-size: 2px; --border-color: #ffffff; --radius: 14px;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --hover-shadow: 0 16px 32px rgba(0,0,0,0.22);
      max-width: 100%; margin: 0 auto; padding: 24px 18px;
    }

    .gallery-masonry { column-count: 3; column-gap: var(--gap); }

    .card {
      break-inside: avoid; margin-bottom: var(--gap);
      border-radius: var(--radius); border: var(--border-size) solid var(--border-color);
      background: #eaeaea; box-shadow: var(--shadow);
      transition: transform 0.3s cubic-bezier(.25,.46,.45,.94), box-shadow 0.3s ease;
      cursor: pointer; overflow: hidden; line-height: 0; position: relative;
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--hover-shadow); border-color:#eee; }
    .card-img-wrap { position: relative; display: block; border-radius: calc(var(--radius) - 2px); overflow: hidden; }
    .card-img-wrap img { width:100%; height:auto; display:block; background:#eaeaea; transition: transform 0.4s cubic-bezier(.25,.46,.45,.94); }
    .card:hover .card-img-wrap img { transform: scale(1.03); }

    /* ========== LIGHTBOX ========== */
    .lightbox {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0; /* Mengunci tepat seukuran jendela browser */
      width: 100vw;
      height: 100vh;
      z-index: 99999;
      background: rgba(246,246,246,0.98);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      display: flex; flex-direction: column;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      overflow: hidden; 
    }
    .lightbox.active { opacity: 1; visibility: visible; }

    .lightbox-content {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
    }

    /* Header: Tombol Close */
    .lightbox-header {
      display: flex; justify-content: flex-end; align-items: center;
      padding: 16px; flex-shrink: 0; 
    }
    .lightbox-close {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.08); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    .lightbox-close:hover { background: rgba(0,0,0,0.18); transform: scale(1.1); }
    .lightbox-close svg { width:20px; height:20px; }

    /* Body: Area Gambar Utama */
    .lightbox-body {
      flex: 1; 
      min-height: 0; /* Sangat penting agar flex child bisa mengecil */
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 0 16px;
    }
    
    .nav-arrow {
      background: rgba(0,0,0,0.08); border: none;
      width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; flex-shrink: 0; z-index: 10;
    }
    .nav-arrow:hover { background: rgba(0,0,0,0.2); }
    .nav-arrow svg { width: 22px; height: 22px; }

    .image-container {
      flex: 1; 
      height: 100%; min-height: 0; 
      display: flex; align-items: center; justify-content: center;
      padding: 0 24px; position: relative;
    }
    
    .image-inner-wrapper {
      position: relative; 
      display: flex; justify-content: center; align-items: center;
      max-width: 100%; max-height: 100%; /* Memastikan wrapper tidak melampaui container */
    }

    .image-inner-wrapper img {
      max-width: 100%; 
      max-height: 100%; 
      object-fit: contain; /* Memastikan seluruh gambar terlihat tanpa terpotong */
      display: block;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      opacity: 0; transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .image-inner-wrapper img.loaded { opacity: 1; transform: scale(1); }

    .loading-spinner {
      position: absolute; width: 40px; height: 40px;
      border: 4px solid rgba(0,0,0,0.1); border-top-color: #333;
      border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
    }
    .loading-spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-text {
      position: absolute; color: #d32f2f; font-size: 14px;
      background: #ffebee; padding: 8px 16px; border-radius: 8px; display: none;
    }
    .error-text.active { display: block; }

    .download-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); border-radius: 8px;
      opacity: 0; transition: opacity 0.2s ease; cursor: pointer;
    }
    .image-inner-wrapper:hover .download-overlay { opacity: 1; }
    .download-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.3); backdrop-filter: blur(4px);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .download-btn:hover { background: rgba(255,255,255,0.6); transform: scale(1.1); transition: 0.2s; }
    .download-btn svg { width: 26px; height: 26px; stroke: white; }

    /* Footer: Caption & Thumbnails */
    .lightbox-footer {
      flex-shrink: 0; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; 
      padding: 24px 16px 32px 16px; 
      gap: 20px; /* Jarak yang luas antara caption dan thumbnail */
    }
    .lightbox-caption {
      text-align: center; color: #444; font-size: 15px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;
    }
    .lightbox-caption:empty { display: none; }

    .thumbnails-wrap {
      width: 100%; max-width: 100%;
      display: flex; gap: 10px; overflow-x: auto; scroll-behavior: smooth;
      padding: 12px; background: rgba(0,0,0,0.06); border-radius: 12px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .thumbnails-wrap::-webkit-scrollbar { display: none; }
    
    .thumb-item {
      flex: 0 0 auto; width: 64px; height: 64px;
      border-radius: 6px; overflow: hidden;
      cursor: pointer; opacity: 0.5; border: 2px solid transparent;
      transition: 0.2s ease; background: #ddd;
    }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-item.active { opacity: 1; border-color: #333; transform: scale(1.05); }
    .thumb-item:hover { opacity: 0.9; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) { .gallery-masonry { column-count: 2; } }
    @media (max-width: 640px) {
      .gallery-masonry { column-count: 1; }
      .lightbox-header { padding: 12px; }
      .lightbox-body { padding: 0 8px; }
      .image-container { padding: 0 12px; }
      .nav-arrow { width: 40px; height: 40px; }
      .nav-arrow svg { width: 18px; height: 18px; }
      .lightbox-footer { padding: 16px 12px 24px 12px; gap: 16px; }
      .thumb-item { width: 52px; height: 52px; }
      .lightbox-caption { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="gallery-root">
    <div class="gallery-status" id="galleryStatus">Loading gallery...</div>
    <div class="gallery-masonry" id="masonryGrid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <div class="lightbox-header">
        <button class="lightbox-close" id="lightboxClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="lightbox-body">
        <button class="nav-arrow prev" id="prevBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 4 7 12 15 20"/></svg>
        </button>
        
        <div class="image-container">
          <div class="loading-spinner" id="loadingSpinner"></div>
          <div class="error-text" id="errorText">Gagal memuat gambar.</div>
          
          <div class="image-inner-wrapper" id="imageWrapper">
            <img id="mainImage" src="" alt="" />
            <div class="download-overlay" id="downloadOverlay">
              <button class="download-btn" id="downloadBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <button class="nav-arrow next" id="nextBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 4 17 12 9 20"/></svg>
        </button>
      </div>

      <div class="lightbox-footer">
        <div class="lightbox-caption" id="lightboxCaption"></div>
        <div class="thumbnails-wrap" id="thumbnailsStrip"></div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const DATA_URL = './gallery-data.json';

    const masonryGrid   = document.getElementById('masonryGrid');
    const statusEl      = document.getElementById('galleryStatus');
    const lightbox      = document.getElementById('lightbox');
    const mainImage     = document.getElementById('mainImage');
    const captionEl     = document.getElementById('lightboxCaption');
    const thumbStrip    = document.getElementById('thumbnailsStrip');
    const spinner       = document.getElementById('loadingSpinner');
    const errorTxt      = document.getElementById('errorText');
    const dlBtn         = document.getElementById('downloadBtn');

    // Pindahkan lightbox ke akar body untuk memastikan posisinya stabil di viewport browser
    document.body.appendChild(lightbox);

    let items = [];
    let currentIndex = 0;

    function sendHeight() {
      if (window.parent && window.parent !== window) {
        const h = document.documentElement.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'galleryResize', height: h }, '*');
      }
    }
    if (window.parent && window.parent !== window) document.body.classList.add('in-iframe');

    function buildMasonry() {
      masonryGrid.innerHTML = '';
      items.forEach((item, i) => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${item.url}" loading="lazy" alt="Gallery image">
          </div>
          ${item.caption ? `<div class="card-caption">${item.caption}</div>` : ''}
        `;
        card.addEventListener('click', () => openLightbox(i));
        masonryGrid.appendChild(card);
      });
      setTimeout(sendHeight, 500);
    }

    function buildThumbnails() {
      thumbStrip.innerHTML = '';
      items.forEach((item, i) => {
        const t = document.createElement('div'); t.className = 'thumb-item'; t.dataset.index = i;
        t.innerHTML = `<img src="${item.url}" loading="lazy" alt="thumb">`;
        t.addEventListener('click', () => loadLightboxImage(i));
        thumbStrip.appendChild(t);
      });
    }

    function loadLightboxImage(index) {
      currentIndex = index;
      const data = items[currentIndex];
      
      mainImage.classList.remove('loaded');
      mainImage.src = ''; 
      spinner.classList.add('active');
      errorTxt.classList.remove('active');
      captionEl.textContent = data.caption || '';
      
      Array.from(thumbStrip.children).forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
        if(i === currentIndex) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });

      const newImg = new Image();
      newImg.onload = () => {
        spinner.classList.remove('active');
        mainImage.src = newImg.src;
        requestAnimationFrame(() => mainImage.classList.add('loaded'));
      };
      newImg.onerror = () => {
        spinner.classList.remove('active');
        errorTxt.classList.add('active');
      };
      newImg.src = data.url;
    }

    function openLightbox(index) {
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; 
      loadLightboxImage(index);
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      mainImage.src = '';
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if(!items.length) return;
      loadLightboxImage((currentIndex - 1 + items.length) % items.length);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if(!items.length) return;
      loadLightboxImage((currentIndex + 1) % items.length);
    });
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if(e.target === lightbox || e.target.classList.contains('lightbox-body') || e.target.classList.contains('image-container')) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
    });

    dlBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const url = items[currentIndex].url;
      const a = document.createElement('a'); 
      a.href = url; a.download = url.split('/').pop().split('?')[0] || 'image.jpg';
      a.target = '_blank';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    fetch(DATA_URL)
      .then(res => {
        if (!res.ok) throw new Error('Data not found');
        return res.json();
      })
      .then(data => {
        if (!data || !data.length) throw new Error('Empty');
        items = data.map(item => typeof item === 'string' ? {url: item, caption: ''} : item);
        statusEl.style.display = 'none';
        buildMasonry();
        buildThumbnails();
      })
      .catch(err => {
        statusEl.textContent = 'Gagal memuat gallery-data.json.';
        statusEl.classList.add('error');
      });
  })();
  </script>
</body>
</html>
